name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-ci:
    name: Backend — Lint + Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: sapa_tazkia_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -ptestpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5

    defaults:
      run:
        working-directory: backend

    env:
      NODE_ENV: test
      DATABASE_URL: mysql://root:testpassword@127.0.0.1:3306/sapa_tazkia_test
      REDIS_URL: redis://127.0.0.1:6379
      JWT_SECRET: ci-test-jwt-secret-32-chars-long-x
      SESSION_SECRET: ci-test-session-secret-32-chars-xx
      OPENAI_API_KEY: sk-test-dummy-not-used-in-unit-tests
      RATE_LIMIT_ENABLED: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run ESLint
        run: npm run lint

      - name: Apply Prisma schema to test DB
        run: npx prisma db push --skip-generate

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload backend coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: backend/coverage/jest/lcov.info
          flags: backend
          name: backend-coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload test results to Codecov (Test Analytics)
        # Skip when the junit file is missing (e.g. lint step failed and
        # tests never ran). Without this guard the action errors out with
        # "No JUnit XML reports found".
        if: ${{ !cancelled() && hashFiles('backend/tests-report/junit.xml') != '' }}
        uses: codecov/test-results-action@v1
        with:
          files: backend/tests-report/junit.xml
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/jest/
          if-no-files-found: warn
          retention-days: 7

      - name: Upload JUnit artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-junit
          path: backend/tests-report/
          if-no-files-found: warn
          retention-days: 7

  frontend-ci:
    name: Frontend — Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --ci --passWithNoTests --watchAll=false --coverage --coverageReporters=lcov --coverageReporters=text-summary
        env:
          CI: "true"

      - name: Upload frontend coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          if-no-files-found: warn
          retention-days: 7

  e2e-ci:
    name: E2E — Playwright
    runs-on: ubuntu-latest
    # Gated: only run when a PR is labeled `run-e2e` or when the secret is set.
    # E2E spins up MySQL + Redis + backend + frontend and needs E2E_LOGIN_* to
    # log into the protected /chat route, so it's opt-in by default.
    if: ${{ github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'run-e2e') }}

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: sapa_tazkia_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -ptestpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5

      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333

    env:
      NODE_ENV: test
      DATABASE_URL: mysql://root:testpassword@127.0.0.1:3306/sapa_tazkia_test
      REDIS_URL: redis://127.0.0.1:6379
      JWT_SECRET: ci-test-jwt-secret-32-chars-long-x
      SESSION_SECRET: ci-test-session-secret-32-chars-xx
      RATE_LIMIT_ENABLED: "false"
      PORT: "5000"
      FRONTEND_URL: http://localhost:3000
      # Frontend dev server config
      REACT_APP_API_URL: http://localhost:5000
      CI: "true"
      # Playwright E2E env — supply test account via GitHub Secrets.
      E2E_BASE_URL: http://localhost:3000
      E2E_TANYA_PATH: /chat/new
      E2E_REQUIRES_AUTH: "true"
      E2E_LOGIN_NIM: ${{ secrets.E2E_LOGIN_NIM }}
      E2E_LOGIN_PASSWORD: ${{ secrets.E2E_LOGIN_PASSWORD }}
      # OpenAI is required by the RAG pipeline the /chat UI invokes.
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      QDRANT_HOST: ${{ secrets.QDRANT_HOST }}
      QDRANT_PORT: ${{ secrets.QDRANT_PORT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Apply Prisma schema to test DB
        working-directory: backend
        run: npx prisma db push --skip-generate

      - name: Seed test user
        working-directory: backend
        env:
          SEED_E2E_NIM: ${{ secrets.E2E_LOGIN_NIM }}
          SEED_E2E_PASSWORD: ${{ secrets.E2E_LOGIN_PASSWORD }}
        run: |
          node -e "
          const bcrypt = require('bcryptjs');
          const { PrismaClient } = require('@prisma/client');
          const prisma = new PrismaClient();
          (async () => {
            const nim = process.env.SEED_E2E_NIM;
            if (!nim) { console.log('No E2E_NIM — skipping seed'); return; }
            // Seed the password from E2E_LOGIN_PASSWORD when supplied so the
            // API-based Playwright login (see backend/tests/e2e/authHelper.js)
            // can authenticate. Fall back to NIM-as-password for backward
            // compat with environments that only set E2E_LOGIN_NIM.
            const plain = process.env.SEED_E2E_PASSWORD || nim;
            const hash = await bcrypt.hash(plain, 10);
            await prisma.user.upsert({
              where: { nim },
              update: { passwordHash: hash, isEmailVerified: true, status: 'active' },
              create: {
                nim,
                email: nim + '@test.local',
                passwordHash: hash,
                fullName: 'E2E Tester',
                authMethod: 'nim',
                userType: 'regular',
                isProfileComplete: true,
                isEmailVerified: true,
                status: 'active',
              },
            });
            console.log('Seeded E2E user:', nim, '(password source:', process.env.SEED_E2E_PASSWORD ? 'E2E_LOGIN_PASSWORD' : 'NIM', ')');
            await prisma.\$disconnect();
          })();
          "

      - name: Install Playwright browsers
        working-directory: backend
        run: npx playwright install --with-deps chromium

      - name: Start backend
        working-directory: backend
        run: |
          npm start &
          echo $! > /tmp/backend.pid
          for i in {1..30}; do
            curl -sf http://localhost:5000/health && break
            sleep 2
          done

      - name: Build + serve frontend
        working-directory: frontend
        # CI=false so react-scripts doesn't treat pre-existing ESLint
        # warnings (missing PropTypes, etc.) as build-failing errors. The
        # outer job still runs with CI=true for Playwright / jest / codecov.
        env:
          CI: "false"
        run: |
          npm run build
          npx serve -s build -l 3000 &
          echo $! > /tmp/frontend.pid
          for i in {1..30}; do
            curl -sf http://localhost:3000/ && break
            sleep 2
          done

      - name: Run Playwright E2E
        working-directory: backend
        run: npm run test:e2e

      - name: Merge coverage (Jest + E2E)
        if: always()
        working-directory: backend
        run: npm run coverage:merge || true

      - name: Upload merged coverage to Codecov
        if: ${{ always() && hashFiles('backend/coverage/lcov.info') != '' }}
        uses: codecov/codecov-action@v5
        with:
          files: backend/coverage/lcov.info
          flags: e2e
          name: e2e-coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload Playwright report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            backend/playwright-report/
            backend/test-results/
          if-no-files-found: warn
          retention-days: 7

      - name: Stop servers
        if: always()
        run: |
          [ -f /tmp/backend.pid ]  && kill "$(cat /tmp/backend.pid)"  || true
          [ -f /tmp/frontend.pid ] && kill "$(cat /tmp/frontend.pid)" || true