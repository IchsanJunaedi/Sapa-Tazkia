# .github/workflows/dast.yml
#
# Dynamic Application Security Testing (DAST) using OWASP ZAP Baseline Scan.
#
# Triggers:
#   - Weekly on Mondays at 03:00 UTC (CEST/WIB night — minimal interference)
#   - Manual dispatch (workflow_dispatch) for on-demand scans
#   - Push/PR to main (informational only — uses continue-on-error)
#
# The baseline scan is non-invasive: it spiders the target, sends passive probes,
# and reports findings without active attacks. It is safe to run against staging.
#
# Docs: https://www.zaproxy.org/docs/docker/baseline-scan/
# Action: https://github.com/zaproxy/action-baseline

name: DAST — OWASP ZAP Baseline Scan

on:
  schedule:
    # Every Monday at 03:00 UTC
    - cron: '0 3 * * 1'
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL to scan (default: staging backend)'
        required: false
        default: ''
      fail_on_warn:
        description: 'Fail if warnings are found (true/false)'
        required: false
        default: 'false'
  push:
    branches: [main]

permissions:
  contents: write
  issues: write           # ZAP action creates/updates a GitHub issue with the report
  pull-requests: write    # Allow commenting on PRs
  actions: write          # Required by ZAP Action to upload report artifacts

jobs:
  zap-baseline:
    name: ZAP Baseline Scan
    runs-on: ubuntu-latest

    env:
      # Primary target — override with workflow_dispatch input or env secret
      TARGET_URL: ${{ github.event.inputs.target_url || vars.DAST_TARGET_URL || 'http://localhost:5000' }}

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: sapa_tazkia_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -ptestpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Write .env for DAST run
        working-directory: backend
        run: |
          cat > .env << 'EOF'
          NODE_ENV=production
          DATABASE_URL=mysql://root:testpassword@127.0.0.1:3306/sapa_tazkia_test
          REDIS_URL=redis://127.0.0.1:6379
          JWT_SECRET=dast-jwt-secret-32-chars-long-xxx
          JWT_REFRESH_SECRET=dast-refresh-secret-32-chars-xxx
          SESSION_SECRET=dast-session-secret-32-chars-xxx
          ADMIN_JWT_SECRET=dast-admin-jwt-secret-32-chars-xxx
          OPENAI_API_KEY=sk-dast-dummy-not-called-in-scan
          OPENAI_MODEL=gpt-4o-mini
          AI_PROVIDER=openai
          RATE_LIMIT_ENABLED=true
          FRONTEND_URL=http://localhost:3000
          PORT=5000
          EOF

      - name: Run DB migrations
        working-directory: backend
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: mysql://root:testpassword@127.0.0.1:3306/sapa_tazkia_test

      - name: Start backend server
        working-directory: backend
        run: |
          nohup node src/app.js &
          echo $! > /tmp/backend.pid
          # Wait until the health endpoint responds
          for i in $(seq 1 30); do
            curl -sf http://localhost:5000/health && break
            echo "Waiting for backend... ($i/30)"
            sleep 3
          done
        env:
          NODE_ENV: production

      - name: Verify backend is running
        run: curl -sf http://localhost:5000/health

      # ── Generate ZAP rules config to suppress known false positives ──────────
      - name: Write ZAP rules file
        run: |
          mkdir -p .zap
          cat > .zap/rules.tsv << 'EOF'
          10202	IGNORE	(Absence of Anti-CSRF Tokens) - API uses JWT, not form CSRF
          10038	IGNORE	(Content Security Policy Header Not Set) - configured at nginx layer
          10035	IGNORE	(Strict-Transport-Security Header Not Set) - TLS terminated at load balancer
          10063	IGNORE	(Permissions Policy Header Not Set) - frontend concern, not API
          90003	IGNORE	(Sub Resource Integrity Attribute Missing) - API endpoint, no HTML assets
          EOF

      # ── OWASP ZAP Baseline Scan ───────────────────────────────────────────────
      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'http://localhost:5000/'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-I'           # -I = don't fail on warnings (informational mode)
          issue_title: 'DAST: ZAP Baseline Findings — ${{ github.sha }}'
          token: ${{ secrets.GITHUB_TOKEN }}
          artifact_name: 'zap-report-${{ github.run_number }}'
          fail_action: ${{ github.event.inputs.fail_on_warn == 'true' }}

      - name: Stop backend server
        if: always()
        run: |
          if [ -f /tmp/backend.pid ]; then
            kill $(cat /tmp/backend.pid) || true
          fi

  # ── Secondary job: Retire.js / npm audit — software composition analysis ───
  sca-audit:
    name: SCA — npm audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: npm audit — backend
        working-directory: backend
        # Audit for high/critical vulnerabilities only; moderate kept informational.
        run: npm audit --audit-level=high --production
        continue-on-error: true   # Don't block CI — report findings

      - name: npm audit — frontend
        working-directory: frontend
        run: npm audit --audit-level=high --production
        continue-on-error: true

      - name: npm audit — root
        run: npm audit --audit-level=high
        continue-on-error: true
