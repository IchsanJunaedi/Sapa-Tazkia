name: Test & Coverage

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint backend
        working-directory: backend
        run: npm run lint

      - name: Lint frontend
        working-directory: frontend
        run: npx eslint src/ --ext .js,.jsx

  unit-and-integration:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DATABASE_URL: mysql://root:testpassword@127.0.0.1:3306/sapa_tazkia_test
      REDIS_URL: redis://127.0.0.1:6379
      NODE_ENV: test
      RATE_LIMIT_ENABLED: "false"

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: sapa_tazkia_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 10s

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      qdrant:
        image: qdrant/qdrant
        ports:
          - 6333:6333

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Setup test env
        working-directory: backend
        run: |
          cp .env.test.example .env.test
          npx prisma db push --skip-generate

      - name: Run backend tests with coverage
        working-directory: backend
        run: npm run test:coverage

      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: backend/coverage/jest/lcov.info
          flags: backend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: always()
        uses: codecov/test-results-action@v1
        with:
          files: backend/tests-report/junit.xml
          flags: backend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test -- --watchAll=false --coverage
        env:
          CI: true

      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [unit-and-integration, frontend-tests]
    continue-on-error: true

    env:
      DATABASE_URL: mysql://root:testpassword@127.0.0.1:3306/sapa_tazkia_test
      REDIS_URL: redis://127.0.0.1:6379
      NODE_ENV: test
      RATE_LIMIT_ENABLED: "false"
      JWT_SECRET: ci-test-jwt-secret-32-chars-long-x
      SESSION_SECRET: ci-test-session-secret-32-chars-xx
      CI: "true"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      E2E_LOGIN_NIM: ${{ secrets.E2E_LOGIN_NIM }}
      E2E_LOGIN_PASSWORD: ${{ secrets.E2E_LOGIN_PASSWORD }}

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: sapa_tazkia_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 10s

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      qdrant:
        image: qdrant/qdrant
        ports:
          - 6333:6333

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Setup test env
        working-directory: backend
        run: |
          cp .env.test.example .env.test
          npx prisma db push --skip-generate

      - name: Seed test user
        working-directory: backend
        env:
          SEED_E2E_NIM: ${{ secrets.E2E_LOGIN_NIM }}
          SEED_E2E_PASSWORD: ${{ secrets.E2E_LOGIN_PASSWORD }}
        run: |
          node -e "
          const bcrypt = require('bcryptjs');
          const { PrismaClient } = require('@prisma/client');
          const prisma = new PrismaClient();
          (async () => {
            const nim = process.env.SEED_E2E_NIM;
            if (!nim) { console.log('No E2E_NIM — skipping seed'); return; }
            const plain = process.env.SEED_E2E_PASSWORD || nim;
            const hash = await bcrypt.hash(plain, 10);
            await prisma.user.upsert({
              where: { nim },
              update: { passwordHash: hash, isEmailVerified: true, status: 'active' },
              create: {
                nim,
                email: nim + '@test.local',
                passwordHash: hash,
                fullName: 'E2E Tester',
                authMethod: 'nim',
                userType: 'regular',
                isProfileComplete: true,
                isEmailVerified: true,
                status: 'active',
              },
            });
            console.log('Seeded E2E user:', nim);
            await prisma.\$disconnect();
          })();
          "

      - name: Install Playwright browsers
        working-directory: backend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: backend
        run: npx playwright test
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: backend/coverage/e2e/html-report/
          retention-days: 7

      - name: Upload Playwright results JSON
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results
          path: backend/coverage/e2e/results.json
          retention-days: 7

      - name: Upload E2E coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v7
        with:
          files: backend/coverage/e2e/lcov.info
          flags: e2e
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
